services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexus-redis-pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexus-redis-pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── DB Init (runs once, then exits) ─────────────────────────────
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: >
      sh -c "npx prisma db push --skip-generate && npm run db:seed"
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}@postgres:5432/nexus
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4400:4400"
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}@postgres:5432/nexus
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET env var}
      - NEXTAUTH_URL=http://localhost:4400
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY:-}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  ws:
    build:
      context: ./ws-server
    ports:
      - "4401:4401"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - NEXUS_API_KEYS=${NEXUS_API_KEYS:-nexus-dev-key}
      - WS_PORT=4401
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  indexer:
    build:
      context: ./indexer
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}@postgres:5432/nexus
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEALTH_PORT=4409
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY:-}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - ARBISCAN_API_KEY=${ARBISCAN_API_KEY:-}
      - BASESCAN_API_KEY=${BASESCAN_API_KEY:-}
      - OPTIMISM_ETHERSCAN_API_KEY=${OPTIMISM_ETHERSCAN_API_KEY:-}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
